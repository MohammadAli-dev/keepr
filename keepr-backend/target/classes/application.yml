spring:
  application:
    name: keepr-backend

  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

keepr:
  jwt:
    secret: keepr-local-dev-secret-key-must-be-at-least-32-chars-long
