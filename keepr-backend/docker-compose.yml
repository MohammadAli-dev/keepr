version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: keepr-postgres
    environment:
      POSTGRES_DB: keepr
      POSTGRES_USER: keepr
      POSTGRES_PASSWORD: keepr_local
    ports:
      - "5432:5432"
    volumes:
      - keepr-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keepr -d keepr"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: keepr-redis
    ports:
      - "6379:6379"
    volumes:
      - keepr-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  keepr-pg-data:
  keepr-redis-data:
